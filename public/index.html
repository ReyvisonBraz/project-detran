<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Consultas DETRAN-PA | Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs"></div>
    
    <main class="container">
        <header class="glass-card header">
            <div class="logo">
                <span class="highlight">ANTIGRAVITY</span> DETRAN
            </div>
            <p class="subtitle">Sistema Inteligente de Gestão de Veículos</p>
        </header>

        <section class="glass-card main-form">
            <div class="form-group">
                <label for="service">O que você deseja fazer?</label>
                <select id="service" class="custom-select">
                    <option value="CONSULTA_DETALHADA">🔍 Consulta Detalhada</option>
                    <option value="LICENCIAMENTO_ATUAL">🧾 Licenciamento (Ano Atual)</option>
                    <option value="CRLV">📄 Emissão de CRLV-e</option>
                    <option value="SNG">🛡️ Consulta de Gravame (SNG)</option>
                </select>
            </div>

            <div class="inputs-grid">
                <div class="input-box">
                    <label>Placa</label>
                    <input type="text" id="placa" placeholder="ABC1234" maxlength="7">
                </div>
                <div class="input-box">
                    <label>Renavam</label>
                    <input type="text" id="renavam" placeholder="123456789" maxlength="11">
                </div>
                <div class="input-box field-cpf hidden">
                    <label>CPF/CNPJ</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00">
                </div>
                <div class="input-box field-chassi hidden">
                    <label>Chassi</label>
                    <input type="text" id="chassi" placeholder="Últimos 21 dígitos">
                </div>
            </div>

            <button id="btn-consultar" class="btn-primary">
                <span>INICIAR CONSULTA</span>
                <div class="loader hidden"></div>
            </button>
        </section>

        <!-- Área de Resultados -->
        <section id="result-area" class="hidden">
            <div class="glass-card status-card">
                <div class="pulse-icon"></div>
                <span id="status-text">Processando sua requisição...</span>
            </div>
            
            <div id="final-results" class="glass-card results-container hidden">
                <h3>Dados do Veículo</h3>
                <div class="data-grid" id="data-display">
                    <!-- Preenchido via JS -->
                </div>
                <div class="document-preview hidden" id="doc-preview">
                    <h4>Documento Capturado</h4>
                    <img id="screenshot-view" src="" alt="Screenshot">
                    <a id="download-btn" href="#" class="btn-secondary" download>BAIXAR IMAGEM</a>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
